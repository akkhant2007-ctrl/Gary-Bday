<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KALAR DETECTED</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* iPhone lock */
.phone {
  width: 390px;
  height: 844px;
  background: black;
  overflow: hidden;
  position: relative;
}

.screen {
  width: 100%;
  height: 100%;
  background: url("background.jpg") center / cover no-repeat;
  position: relative;
}

/* Popup images */
.popup-container {
  position: absolute;
  top: 110px;
  left: 16px;
  display: flex;
  gap: 10px;
  opacity: 0;
}

.popup-container img {
  width: 80px;
  border: 2px solid red;
  background: black;
}

/* Scanner text */
.scanner {
  position: absolute;
  top: 150px;
  left: 180px;
  color: red;
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 3px;
  opacity: 0;
}

/* Loader */
.loader {
  position: absolute;
  top: 215px;
  left: 255px;
  width: 44px;
  height: 44px;
  border: 4px solid transparent;
  border-top: 4px solid red;
  border-radius: 50%;
  opacity: 0;
}

/* Detected */
.detected {
  position: absolute;
  top: 250px;
  left: 165px;
  color: red;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 4px;
  opacity: 0;
}

/* Arrow */
.arrow {
  position: absolute;
  top: 185px;
  left: 0;
  width: 120px;
  opacity: 0;
}

.arrow.active {
  animation: arrowWiggle 1s ease-in-out infinite;
}

.arrow path {
  stroke: red;
  stroke-width: 6;
  fill: none;
}

/* Birthday */
.birthday {
  position: absolute;
  bottom: 130px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  color: white;
  opacity: 0;
}

.party {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  font-size: 32px;
  opacity: 0;
}

/* Confetti */
.confetti {
  position: absolute;
  top: -10px;
  width: 8px;
  height: 8px;
  animation: fall 4s linear infinite;
}

/* Animations */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes arrowWiggle {
  0% { transform: translateX(0); }
  50% { transform: translateX(6px); }
  100% { transform: translateX(0); }
}
@keyframes fall {
  to { transform: translateY(900px) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="phone">
  <div class="screen">

    <!-- ✅ REAL IMAGES -->
    <div class="popup-container" id="popups">
      popup1.jpg
      popup2.jpg
    </div>

    <!-- Arrow -->
    <svg class="arrow" id="arrow" viewBox="0 0 120 60">
      <path d="M10 30 L110 30 M110 30 L90 10 M110 30 L90 50"/>
    </svg>

    <!-- Scanner -->
    <div class="scanner" id="scanner">SCANNING BIOMETRICS…</div>

    <!-- Loader -->
    <div class="loader" id="loader"></div>

    <!-- Detected -->
    <div class="detected" id="detected">KALAR DETECTED</div>

    <!-- Birthday -->
    <div class="birthday" id="birthday">Happy Birthday Gary!</div>
    <div class="party" id="party">🎉 🎂 🎉</div>

  </div>
</div>

<script>
const popups = document.getElementById("popups");
const scanner = document.getElementById("scanner");
const loader = document.getElementById("loader");
const detected = document.getElementById("detected");
const arrow = document.getElementById("arrow");
const birthday = document.getElementById("birthday");
const party = document.getElementById("party");

/* Popups */
setTimeout(() => popups.style.opacity = 1, 1000);

/* Scanner + loader */
setTimeout(() => {
  scanner.style.opacity = 1;
  loader.style.opacity = 1;
  loader.style.animation = "spin 1s linear infinite";
}, 2000);

/* FULLY HIDE SCAN */
setTimeout(() => {
  scanner.style.opacity = 0;
  loader.style.opacity = 0;
  loader.style.animation = "none";
}, 6000);

/* Detected + arrow */
setTimeout(() => {
  detected.style.opacity = 1;
  arrow.style.opacity = 1;
  arrow.classList.add("active");
}, 6500);

/* Birthday + confetti */
setTimeout(() => {
  birthday.style.opacity = 1;
  party.style.opacity = 1;

  for (let i = 0; i < 30; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 390 + "px";
    c.style.background =
      ["red","gold","white"][Math.floor(Math.random()*3)];
    document.body.appendChild(c);
  }
}, 9500);
</script>

</body>
</html>
